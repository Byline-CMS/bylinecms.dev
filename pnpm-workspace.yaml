packages:
  - "packages/*"
  - "apps/*"
  - "benchmarks/storage"
minimumReleaseAge: 0
minimumReleaseAgeExclude:
  - "@infonomic/*"
  - "@byline/*"
allowBuilds:
  "@google/genai": true
  "@parcel/watcher": true
  esbuild: true
  lightningcss-cli: true
  protobufjs: true
  sharp: true
  simple-git-hooks: true
  "@tailwindcss/oxide": true
  argon2: true
  core-js: true
allowedDeprecatedVersions:
  abab: "2"
  domexception: "4"
overrides:
  typescript: $typescript
  react: 19.2.5
  react-dom: 19.2.5
