<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 820" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Byline CMS — Deployment Scenario 4: Three dedicated hosts</title>
  <desc>Three hosts: a dedicated HTTP API server, a dedicated admin host (no exposed HTTP), and a dedicated front-end host. The front-end consumes the API host over the network. The admin host and API host share the database.</desc>

  <style>
    .title       { font-size: 22px; font-weight: 700; }
    .subtitle    { font-size: 13px; }
    .title-fg    { fill: #475569; }
    .subtitle-fg { fill: #475569; }

    .host-stroke { stroke: #94a3b8; fill: none; stroke-dasharray: 6 5; stroke-width: 1.6; }
    .host-label  { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; fill: #64748b; }

    .box-label    { fill: #ffffff; font-weight: 600; font-size: 15px; text-anchor: middle; }
    .box-sublabel { fill: #ffffff; opacity: 0.85; font-size: 11px; text-anchor: middle; }

    .ext-label   { font-size: 13px; fill: #334155; text-anchor: middle; font-weight: 600; }
    .ext-sub     { font-size: 11px; fill: #64748b; text-anchor: middle; }
    .ext-fill    { fill: #475569; }

    .arrow       { stroke: #64748b; fill: none; stroke-width: 1.6; }
    .arrow-net   { stroke: #b91c1c; fill: none; stroke-width: 2; stroke-dasharray: 7 4; }
    .net-label   { font-size: 11px; font-weight: 600; fill: #b91c1c; text-anchor: middle; letter-spacing: 0.05em; }

    @media (prefers-color-scheme: dark) {
      .title-fg    { fill: #94a3b8; }
      .subtitle-fg { fill: #94a3b8; }
      .host-stroke { stroke: #64748b; }
      .host-label  { fill: #94a3b8; }
      .ext-label   { fill: #e2e8f0; }
      .ext-sub     { fill: #94a3b8; }
      .ext-fill    { fill: #64748b; }
      .arrow       { stroke: #94a3b8; }
      .arrow-net   { stroke: #f87171; }
      .net-label   { fill: #f87171; }
    }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-net" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="660" y="38" class="title title-fg" text-anchor="middle">Scenario 4 — Three dedicated hosts</text>
  <text x="660" y="62" class="subtitle subtitle-fg" text-anchor="middle">
    Dedicated API host, dedicated admin host (no exposed HTTP), and a dedicated front-end host. Admin and API share Postgres; the front-end consumes the API over the network.
  </text>

  <!-- External actors -->
  <g transform="translate(230, 130)">
    <rect x="-95" y="-32" width="190" height="64" rx="8" class="ext-fill"/>
    <text x="0" y="-4" class="box-label">Editors</text>
    <text x="0" y="16" class="box-sublabel">admin users</text>
  </g>
  <g transform="translate(660, 130)">
    <rect x="-115" y="-32" width="230" height="64" rx="8" class="ext-fill"/>
    <text x="0" y="-4" class="box-label">Other clients</text>
    <text x="0" y="16" class="box-sublabel">mobile · other frameworks · partners</text>
  </g>
  <g transform="translate(1090, 130)">
    <rect x="-95" y="-32" width="190" height="64" rx="8" class="ext-fill"/>
    <text x="0" y="-4" class="box-label">Visitors</text>
    <text x="0" y="16" class="box-sublabel">browsers · search bots</text>
  </g>

  <line x1="230"  y1="165" x2="230"  y2="245" class="arrow" marker-end="url(#arrow)"/>
  <line x1="660"  y1="165" x2="660"  y2="245" class="arrow-net" marker-end="url(#arrow-net)"/>
  <line x1="1090" y1="165" x2="1090" y2="245" class="arrow" marker-end="url(#arrow)"/>

  <!-- HOST B: Admin (left) -->
  <rect x="40" y="250" width="380" height="380" rx="14" class="host-stroke"/>
  <text x="60" y="272" class="host-label">HOST B · ADMIN ONLY</text>

  <g transform="translate(70, 296)">
    <rect width="320" height="78" rx="8" fill="#1d4ed8"/>
    <text x="160" y="34" class="box-label">Admin Dashboard</text>
    <text x="160" y="54" class="box-sublabel">editor UI · no exposed HTTP</text>
  </g>
  <line x1="230" y1="374" x2="230" y2="406" class="arrow" marker-end="url(#arrow)"/>

  <g transform="translate(70, 410)">
    <rect width="320" height="68" rx="8" fill="#b45309"/>
    <text x="160" y="28" class="box-label">@byline/client — Client SDK</text>
    <text x="160" y="48" class="box-sublabel">in-process</text>
  </g>
  <line x1="230" y1="478" x2="230" y2="510" class="arrow" marker-end="url(#arrow)"/>

  <g transform="translate(70, 514)">
    <rect width="320" height="78" rx="8" fill="#334155"/>
    <text x="160" y="34" class="box-label">Byline Core runtime</text>
    <text x="160" y="54" class="box-sublabel">collections · versioning · workflow</text>
  </g>

  <!-- HOST A: API (middle) -->
  <rect x="470" y="250" width="380" height="380" rx="14" class="host-stroke"/>
  <text x="490" y="272" class="host-label">HOST A · HTTP API ONLY</text>

  <g transform="translate(500, 296)">
    <rect width="320" height="78" rx="8" fill="#b91c1c"/>
    <text x="160" y="34" class="box-label">HTTP API</text>
    <text x="160" y="54" class="box-sublabel">routes map 1:1 to Client SDK</text>
  </g>
  <line x1="660" y1="374" x2="660" y2="406" class="arrow" marker-end="url(#arrow)"/>

  <g transform="translate(500, 410)">
    <rect width="320" height="68" rx="8" fill="#b45309"/>
    <text x="160" y="28" class="box-label">@byline/client — Client SDK</text>
    <text x="160" y="48" class="box-sublabel">in-process</text>
  </g>
  <line x1="660" y1="478" x2="660" y2="510" class="arrow" marker-end="url(#arrow)"/>

  <g transform="translate(500, 514)">
    <rect width="320" height="78" rx="8" fill="#334155"/>
    <text x="160" y="34" class="box-label">Byline Core runtime</text>
    <text x="160" y="54" class="box-sublabel">collections · versioning · workflow</text>
  </g>

  <!-- HOST C: Frontend (right) -->
  <rect x="900" y="250" width="380" height="220" rx="14" class="host-stroke"/>
  <text x="920" y="272" class="host-label">HOST C · FRONT-END ONLY</text>

  <g transform="translate(930, 320)">
    <rect width="320" height="130" rx="8" fill="#15803d"/>
    <text x="160" y="50" class="box-label">Front-end Web App</text>
    <text x="160" y="72" class="box-sublabel">primary client</text>
    <text x="160" y="92" class="box-sublabel">calls HTTP API over the network</text>
  </g>

  <!-- Cross-host arrow: Frontend (Host C) → HTTP API (Host A) -->
  <path d="M 900,385 C 880,385 870,335 850,335" class="arrow-net" marker-end="url(#arrow-net)"/>
  <text x="875" y="315" class="net-label">HTTPS · 1:1 SDK routes</text>

  <!-- Shared Postgres at bottom, connected to both Host B and Host A -->
  <path d="M 230,630 L 230,690 L 660,690" class="arrow"/>
  <line x1="660" y1="630" x2="660" y2="690" class="arrow"/>
  <line x1="660" y1="690" x2="660" y2="720" class="arrow" marker-end="url(#arrow)"/>

  <g transform="translate(660, 760)">
    <ellipse cx="0" cy="-18" rx="130" ry="13" fill="#0f172a"/>
    <path d="M -130,-18 L -130,18 A 130,13 0 0 0 130,18 L 130,-18 Z" fill="#0f172a"/>
    <ellipse cx="0" cy="-18" rx="130" ry="13" fill="#1e293b"/>
    <text x="0" y="6" class="box-label">Postgres</text>
    <text x="0" y="24" class="box-sublabel">shared by Host A and Host B</text>
  </g>
</svg>
